function genQ(){
const ops=[”+”,”-”,“×”];
const op=ops[Math.floor(Math.random()*3)];
let a,b,ans;
if(op===”+”){a=Math.floor(Math.random()*50)+1;b=Math.floor(Math.random()*50)+1;ans=a+b;}
else if(op===”-”){a=Math.floor(Math.random()*50)+10;b=Math.floor(Math.random()*a)+1;ans=a-b;}
else{a=Math.floor(Math.random()*12)+1;b=Math.floor(Math.random()*12)+1;ans=a*b;}
const wrong=new Set();
while(wrong.size<3){const w=ans+(Math.floor(Math.random()*10)-4);if(w!==ans&&w>0)wrong.add(w);}
return{q:`${a} ${op} ${b}`,ans,choices:[…wrong,ans].sort(()=>Math.random()-0.5)};
}

<button style={{…S.btnSec,padding:“7px 14px”,fontSize:“0.82rem”}} onClick={()=>setPage(“home”)}>← Home</button>

<div style={{display:“flex”,alignItems:“center”,gap:“1rem”,marginBottom:“2rem”,flexWrap:“wrap”}}>
<div style={{fontSize:“2.5rem”}}>👋</div>
<div>
<div style={{fontSize:“1.7rem”,fontWeight:900,color:C.navy}}>Hallo, 
<input value={kidName} onChange={e=>setKidName(e.target.value)}
style={{border:`2px solid ${C.coral}55`,borderRadius:“10px”,padding:“2px 10px”,fontSize:“1.5rem”,fontWeight:900,color:C.coral,background:“transparent”,width:“140px”,fontFamily:“inherit”,outline:“none”}}/>!
</div>
<div style={{color:C.navy,opacity:0.5,fontWeight:600,fontSize:“0.88rem”,marginTop:“4px”}}>🔥 7 Tage Streak · ⭐ 42 Punkte · 🏅 3 Badges</div>
</div>
</div>
<div style={{display:“grid”,gridTemplateColumns:“repeat(auto-fit,minmax(260px,1fr))”,gap:“1.25rem”,marginBottom:“1.5rem”}}>
<div style={S.card()}>
<div style={{fontWeight:800,fontSize:“1rem”,marginBottom:“1.25rem”,color:C.navy}}>📈 Mein Fortschritt</div>
{[[“Mathematik”,72,C.coral],[“Deutsch”,58,C.mint],[“NMG”,85,C.sky],[“Französisch”,44,C.lilac]].map(([f,p,c],i)=>(
<div key={i} style={{marginBottom:“0.85rem”}}>
<div style={{display:“flex”,justifyContent:“space-between”,fontSize:“0.86rem”,fontWeight:700,marginBottom:“5px”}}>
<span>{f}</span><span style={{color:c}}>{p}%</span>
</div>
<div style={{background:C.fog,borderRadius:“6px”,height:“10px”,overflow:“hidden”}}>
<div style={{background:c,width:`${p}%`,height:“100%”,borderRadius:“6px”,transition:“width 1.2s ease”}}/>
</div>
</div>
))}
</div>
<div style={S.card()}>
<div style={{fontWeight:800,fontSize:“1rem”,marginBottom:“1.25rem”,color:C.navy}}>🎮 Spiele</div>
{[[“🏎️”,“Zahlen-Rennen”,“Mathe”,C.coral],[“🔍”,“Lese-Detektiv”,“Deutsch”,C.mint],[“🌍”,“Quiz-Battle”,“NMG”,C.sky],[“🃏”,“Vokabel-Memory”,“Français”,C.lilac]].map(([ic,nm,f,c],i)=>(
<div key={i} onClick={()=>document.getElementById(“game-section”).scrollIntoView({behavior:“smooth”})}
style={{display:“flex”,alignItems:“center”,gap:“0.75rem”,padding:“9px 12px”,borderRadius:“12px”,marginBottom:“0.5rem”,cursor:“pointer”,background:C.cream,border:`2px solid ${C.fog}`,transition:“border-color 0.15s”}}
onMouseEnter={e=>e.currentTarget.style.borderColor=c}
onMouseLeave={e=>e.currentTarget.style.borderColor=C.fog}>
<span style={{fontSize:“1.3rem”}}>{ic}</span>
<div><div style={{fontWeight:700,fontSize:“0.9rem”}}>{nm}</div><div style={{fontSize:“0.76rem”,color:c,fontWeight:700}}>{f}</div></div>
<span style={{marginLeft:“auto”,color:C.fog,fontWeight:900}}>▶</span>
</div>
))}
</div>
</div>
<div id="game-section" style={S.card()}>
<div style={{fontWeight:800,fontSize:“1rem”,marginBottom:“1.25rem”,color:C.navy}}>🏎️ Mathe-Rennen spielen</div>
<div style={{maxWidth:“400px”,margin:“0 auto”,textAlign:“center”}}>
{gameState===“idle”&&<button style={S.btnPrimary} onClick={startGame}>{t.demoStart}</button>}
{gameState===“playing”&&currentQ&&<>
<div style={{display:“flex”,justifyContent:“space-between”,fontWeight:800,marginBottom:“0.75rem”}}>
<span style={{color:C.mint,fontSize:“1.1rem”}}>⭐ {score}</span>
<span style={{fontSize:“2rem”,fontWeight:900,color:timeLeft<=10?C.rose:C.coral}}>{timeLeft}s</span>
</div>
<div style={{background:`${C.coral}15`,borderRadius:“8px”,height:“6px”,marginBottom:“1.5rem”}}>
<div style={{background:C.coral,width:`${(timeLeft/30)*100}%`,height:“100%”,borderRadius:“8px”,transition:“width 1s linear”}}/>
</div>
<div style={{fontSize:“2.8rem”,fontWeight:900,color:C.coral,margin:“1rem 0”,letterSpacing:”-0.02em”}}>{currentQ.q} = ?</div>
{feedback&&<div style={{fontWeight:900,color:feedback===“ok”?C.mint:C.rose,marginBottom:“0.4rem”,fontSize:“1rem”}}>{feedback===“ok”?“✓ Richtig!”:“✗ Falsch”}</div>}
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:“0.75rem”}}>
{currentQ.choices.map((c,i)=>(
<button key={i} onClick={()=>handleAnswer(c)}
style={{background:feedback?(c===currentQ.ans?`${C.mint}33`:`${C.rose}22`):C.cream,border:`2.5px solid ${feedback?(c===currentQ.ans?C.mint:C.rose):C.fog}`,color:C.navy,padding:“13px”,borderRadius:“13px”,cursor:“pointer”,fontWeight:800,fontSize:“1.2rem”,transition:“all 0.15s”}}>
{c}
</button>
))}
</div>
</>}
{gameState===“done”&&<>
<div style={{fontSize:“2.5rem”}}>🏆</div>
<div style={{fontSize:“1.5rem”,fontWeight:900,color:C.coral,margin:“0.5rem 0”}}>{t.demoEnd}</div>
<div style={{fontWeight:700,color:C.mint}}>+{score} Punkte!</div>
{score>=10&&<div style={{color:C.coral,fontWeight:700,fontSize:“0.88rem”,marginTop:“0.25rem”}}>🔥 Mega!</div>}
<button style={{…S.btnPrimary,marginTop:“1.25rem”}} onClick={startGame}>{t.demoRetry}</button>
</>}
</div>
</div>
</div>
</div>
);

      <div key={i} style={{flex:"1 1 120px",textAlign:"center",padding:"1.75rem 1rem",borderRight:i<3?`2px solid ${C.fog}`:"none",maxWidth:"260px"}}>
        <div style={{fontSize:"2.3rem",fontWeight:900,color:C.coral}}>{v}</div>
        <div style={{fontSize:"0.78rem",fontWeight:700,color:C.navy,opacity:0.45,marginTop:"4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{t.statsLabel[i]}</div>
      </div>
    ))}
  </div>

  {/* HOW IT WORKS */}
  <div id="sec-program" style={S.section}>
    <h2 style={S.secTitle}>{t.howTitle}</h2>
    <p style={S.secSub}>{t.howSub}</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(185px,1fr))",gap:"1.25rem"}}>
      {t.steps.map((st,i)=>(
        <div key={i} style={{background:hovStep===i?C.white:C.cream,border:`2.5px solid ${hovStep===i?C.coral:C.fog}`,borderRadius:"20px",padding:"1.6rem 1.25rem",cursor:"pointer",transition:"all 0.2s",transform:hovStep===i?"translateY(-5px)":"none",boxShadow:hovStep===i?`0 12px 32px ${C.coral}22`:"0 2px 8px rgba(44,62,90,0.05)"}}
          onMouseEnter={()=>setHovStep(i)} onMouseLeave={()=>setHovStep(null)}>
          <div style={{fontSize:"2rem",marginBottom:"0.7rem"}}>{st.icon}</div>
          <div style={{fontWeight:800,marginBottom:"0.4rem",fontSize:"0.97rem",color:C.navy}}>{st.t}</div>
          <div style={{fontSize:"0.85rem",color:C.navy,opacity:0.58,lineHeight:1.65}}>{st.d}</div>
        </div>
      ))}
    </div>
  </div>

  {/* SUBJECTS */}
  <div style={{background:C.white,padding:"80px 2rem"}}>
    <div style={{maxWidth:"860px",margin:"0 auto"}}>
      <h2 style={S.secTitle}>{t.subTitle}</h2>
      <p style={S.secSub}>Lehrplan 21 · Basel-Stadt · Übertrittsgewichtung</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:"1rem",justifyContent:"center"}}>
        {t.subjects.map((su,i)=>(
          <div key={i} style={{background:`${su.c}18`,border:`2.5px solid ${su.c}55`,borderRadius:"16px",padding:"1.25rem 1.6rem",textAlign:"center",minWidth:"138px",transition:"transform 0.2s",cursor:"default"}}
            onMouseEnter={e=>e.currentTarget.style.transform="translateY(-4px)"}
            onMouseLeave={e=>e.currentTarget.style.transform="none"}>
            <div style={{fontSize:"1.7rem"}}>{su.e}</div>
            <div style={{color:su.c,fontSize:"1.7rem",fontWeight:900}}>{su.w}</div>
            <div style={{fontWeight:800,fontSize:"0.9rem",marginTop:"4px",color:C.navy}}>{su.n}</div>
          </div>
        ))}
      </div>
    </div>
  </div>

  {/* DEMO GAME */}
  <div id="sec-demo" style={S.section}>
    <h2 style={S.secTitle}>{t.demoTitle}</h2>
    <p style={S.secSub}>{t.demoSub}</p>
    <div style={{background:C.white,border:`3px solid ${C.fog}`,borderRadius:"24px",padding:"2.5rem",maxWidth:"460px",margin:"0 auto",textAlign:"center",boxShadow:`0 8px 36px ${C.sky}44`}}>
      {gameState==="idle"&&(
        <div>
          <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🏎️</div>
          <button style={S.btnPrimary} onClick={startGame}>{t.demoStart}</button>
        </div>
      )}
      {gameState==="playing"&&currentQ&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
            <div style={{fontWeight:800,color:C.mint,fontSize:"1.1rem"}}>⭐ {score}</div>
            <div style={{fontSize:"2.4rem",fontWeight:900,color:timeLeft<=10?C.rose:C.coral}}>{timeLeft}s</div>
          </div>
          <div style={{background:`${C.coral}18`,borderRadius:"8px",height:"7px",marginBottom:"1.5rem",overflow:"hidden"}}>
            <div style={{background:C.coral,width:`${(timeLeft/30)*100}%`,height:"100%",borderRadius:"8px",transition:"width 1s linear"}}/>
          </div>
          <div style={{fontSize:"2.8rem",fontWeight:900,color:C.coral,margin:"1rem 0",letterSpacing:"-0.02em"}}>{currentQ.q} = ?</div>
          {feedback&&<div style={{fontWeight:900,color:feedback==="ok"?C.mint:C.rose,fontSize:"1.1rem",marginBottom:"0.5rem"}}>{feedback==="ok"?"✓ Richtig!":"✗ Falsch"}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem"}}>
            {currentQ.choices.map((c,i)=>(
              <button key={i} onClick={()=>handleAnswer(c)}
                style={{background:feedback?(c===currentQ.ans?`${C.mint}33`:`${C.rose}22`):C.cream,border:`2.5px solid ${feedback?(c===currentQ.ans?C.mint:C.rose):C.fog}`,color:C.navy,padding:"13px",borderRadius:"13px",cursor:"pointer",fontWeight:800,fontSize:"1.2rem",transition:"all 0.15s"}}
                onMouseEnter={e=>{if(!feedback)e.currentTarget.style.background=C.fog}}
                onMouseLeave={e=>{if(!feedback)e.currentTarget.style.background=C.cream}}>
                {c}
              </button>
            ))}
          </div>
        </>
      )}
      {gameState==="done"&&(
        <>
          <div style={{fontSize:"3rem"}}>🏆</div>
          <h3 style={{fontSize:"1.5rem",fontWeight:900,color:C.navy,margin:"0.5rem 0"}}>{t.demoEnd}</h3>
          <p style={{fontWeight:800,color:C.coral,fontSize:"1.1rem"}}>+{score} Punkte!</p>
          {score>=8&&<p style={{color:C.mint,fontWeight:700,fontSize:"0.88rem"}}>🔥 Top Ergebnis!</p>}
          <button style={{...S.btnPrimary,marginTop:"1.25rem"}} onClick={startGame}>{t.demoRetry}</button>
        </>
      )}
    </div>
  </div>

  {/* TEAM */}
  <div id="sec-team" style={{background:C.white,padding:"90px 2rem"}}>
    <div style={{maxWidth:"900px",margin:"0 auto"}}>
      <h2 style={S.secTitle}>{t.teamTitle}</h2>
      <p style={S.secSub}>{t.teamSub}</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:"1.5rem"}}>
        {[["fabian",C.coral,"👨‍🏫"],["timothy",C.sky,"👨‍💻"]].map(([key,col,ico])=>{
          const p=t[key]; const exp=expandTeam===key;
          return(
            <div key={key} style={{background:exp?`${col}10`:C.cream,border:`2.5px solid ${exp?col:C.fog}`,borderRadius:"22px",padding:"1.75rem",cursor:"pointer",transition:"all 0.25s",boxShadow:exp?`0 12px 36px ${col}33`:"0 4px 14px rgba(44,62,90,0.05)"}}
              onClick={()=>setExpandTeam(exp?null:key)}>
              <div style={{display:"flex",alignItems:"flex-start",gap:"1rem"}}>
                <div style={{width:"66px",height:"66px",borderRadius:"50%",background:`linear-gradient(135deg,${col},${col}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.9rem",flexShrink:0}}>{ico}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:900,fontSize:"1.2rem",color:C.navy}}>{p.name}</div>
                  <div style={{color:col,fontWeight:700,fontSize:"0.86rem",marginTop:"2px"}}>{p.role}</div>
                  <div style={{fontSize:"0.8rem",color:C.navy,opacity:0.42,marginTop:"3px",fontStyle:"italic"}}>{p.tag}</div>
                </div>
                <div style={{fontSize:"1.2rem",color:col,fontWeight:900,transition:"transform 0.2s",transform:exp?"rotate(180deg)":"none"}}>▾</div>
              </div>
              {exp&&(
                <div style={{marginTop:"1.25rem",paddingTop:"1.25rem",borderTop:`2px solid ${col}22`}}>
                  <p style={{color:C.navy,opacity:0.65,lineHeight:1.75,fontSize:"0.88rem",fontWeight:600,marginBottom:"1rem"}}>{p.bio}</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                    {p.facts.map((f,i)=><span key={i} style={S.tag(col)}>{f}</span>)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  </div>

  {/* PRICES */}
  <div id="sec-prices" style={S.section}>
    <h2 style={S.secTitle}>{t.priceTitle}</h2>
    <p style={S.secSub}>{t.priceSub}</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:"1.5rem",maxWidth:"680px",margin:"0 auto 2rem"}}>
      {t.plans.map((pl,i)=>(
        <div key={i} style={{background:pl.hi?`${C.coral}0E`:C.white,border:`2.5px solid ${hovPlan===i||pl.hi?C.coral:C.fog}`,borderRadius:"22px",padding:"2rem",position:"relative",transition:"all 0.2s",transform:hovPlan===i?"translateY(-4px)":"none",boxShadow:hovPlan===i?`0 12px 34px ${C.coral}22`:"0 4px 14px rgba(44,62,90,0.05)",cursor:"pointer"}}
          onMouseEnter={()=>setHovPlan(i)} onMouseLeave={()=>setHovPlan(null)} onClick={openChat}>
          {pl.hi&&<span style={{...S.tag(C.coral),position:"absolute",top:"1rem",right:"1rem"}}>⭐ Top</span>}
          <div style={{fontWeight:900,fontSize:"1.1rem",color:C.navy,marginBottom:"0.25rem"}}>{pl.name}</div>
          <div style={{fontSize:"2.3rem",fontWeight:900,color:C.coral,margin:"0.4rem 0"}}>{pl.price}</div>
          <div style={{color:C.navy,opacity:0.38,fontSize:"0.84rem",fontWeight:700,marginBottom:"1.25rem"}}>{pl.period}</div>
          {pl.feats.map((f,j)=>(
            <div key={j} style={{fontSize:"0.86rem",color:C.navy,opacity:0.65,padding:"5px 0",display:"flex",alignItems:"center",gap:"0.5rem",fontWeight:600}}>
              <span style={{color:C.mint,fontWeight:900}}>✓</span>{f}
            </div>
          ))}
          <button style={{...S.btnPrimary,width:"100%",marginTop:"1.5rem",background:pl.hi?C.coral:C.navy,boxShadow:"none"}}>{t.heroCta}</button>
        </div>
      ))}
    </div>
    <div style={{background:`${C.mint}18`,border:`2.5px solid ${C.mint}55`,borderRadius:"20px",padding:"2rem",textAlign:"center",maxWidth:"680px",margin:"0 auto"}}>
      <div style={{fontWeight:900,fontSize:"1.1rem",color:C.mint,marginBottom:"0.75rem"}}>{t.exam.name}</div>
      <div style={{display:"flex",gap:"2.5rem",justifyContent:"center",margin:"0.75rem 0",flexWrap:"wrap"}}>
        <div><div style={{fontSize:"1.6rem",fontWeight:900,color:C.navy}}>{t.exam.g}</div><div style={{fontSize:"0.78rem",color:C.navy,opacity:0.4,fontWeight:600}}>{t.exam.gLabel}</div></div>
        <div><div style={{fontSize:"1.6rem",fontWeight:900,color:C.navy}}>{t.exam.s}</div><div style={{fontSize:"0.78rem",color:C.navy,opacity:0.4,fontWeight:600}}>{t.exam.sLabel}</div></div>
      </div>
      <p style={{color:C.navy,opacity:0.55,fontSize:"0.86rem",fontWeight:600}}>{t.exam.d}</p>
    </div>
  </div>

  {/* FOOTER */}
  <div style={{background:C.navy,color:C.white,textAlign:"center",padding:"2.5rem 2rem"}}>
    <div style={{fontWeight:900,fontSize:"1.5rem",color:C.coral,marginBottom:"0.3rem"}}>SekStep</div>
    <div style={{opacity:0.45,fontWeight:600,fontSize:"0.88rem"}}>Fabian Schmidt × Timothy Henry · Basel · 2025</div>
    <div style={{opacity:0.3,fontWeight:600,fontSize:"0.78rem",marginTop:"0.4rem"}}>Lehrplan 21 · Übertritt 6. Klasse · A/E/P</div>
  </div>

  {/* CHAT BUTTON */}
  <button style={{position:"fixed",bottom:"1.75rem",right:"1.75rem",zIndex:300,background:C.coral,color:"#fff",border:"none",width:"62px",height:"62px",borderRadius:"50%",fontSize:"1.5rem",cursor:"pointer",boxShadow:`0 8px 26px ${C.coral}55`,display:"flex",alignItems:"center",justifyContent:"center",transition:"transform 0.2s"}}
    onClick={()=>chatOpen?setChatOpen(false):openChat()}
    onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
    onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
    {chatOpen?"✕":"💬"}
  </button>

  {/* CHAT WINDOW */}
  {chatOpen&&(
    <div style={S.chatWin}>
      <div style={{background:`linear-gradient(135deg,${C.coral},${C.rose})`,padding:"1rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontWeight:900,color:"#fff",fontSize:"0.97rem"}}>SekStep Assistent</div>
          <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,0.75)",fontWeight:600}}>Built by Timothy · Guided by Fabian</div>
        </div>
        <button onClick={()=>setChatOpen(false)} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",fontSize:"1.2rem",fontWeight:900,lineHeight:1}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:"0.75rem",maxHeight:"300px"}}>
        {chatHistory.map((m,i)=>(
          <div key={i} style={m.r==="bot"?{background:C.fog,borderRadius:"14px 14px 14px 4px",padding:"0.75rem 1rem",fontSize:"0.86rem",lineHeight:1.6,maxWidth:"90%",color:C.navy,fontWeight:600,whiteSpace:"pre-line"}:{background:`${C.coral}20`,borderRadius:"14px 14px 4px 14px",padding:"0.75rem 1rem",fontSize:"0.86rem",alignSelf:"flex-end",maxWidth:"80%",color:C.navy,fontWeight:700}}>
            {m.text}
          </div>
        ))}
        <div ref={chatEndRef}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem",padding:"0.75rem 1rem",borderTop:`2px solid ${C.fog}`}}>
        {chatDone?(
          t.chatDone.map((o,i)=>(
            <button key={i} style={{background:`${C.coral}15`,border:`1.5px solid ${C.coral}44`,color:C.coral,padding:"6px 13px",borderRadius:"16px",cursor:"pointer",fontSize:"0.8rem",fontWeight:700,transition:"background 0.15s"}}
              onClick={()=>setChatOpen(false)}>{o}</button>
          ))
        ):(
          lastBot?.opts?.map((o,i)=>(
            <button key={i} style={{background:`${C.coral}15`,border:`1.5px solid ${C.coral}44`,color:C.coral,padding:"6px 13px",borderRadius:"16px",cursor:"pointer",fontSize:"0.8rem",fontWeight:700,transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background=`${C.coral}30`}
              onMouseLeave={e=>e.currentTarget.style.background=`${C.coral}15`}
              onClick={()=>chatChoose(o)}>{o}</button>
          ))
        )}
      </div>
    </div>
  )}
</div>
